AWSTemplateFormatVersion: "2010-09-09"
Description: "Log Aggregator ? ECS Fargate + ALB + CodeBuild + Bedrock + EFS + Raw/Processed S3 Buckets + Lambda Processor + Scheduler"

# ??????????????????????????????????????????????????????????????????????????????
# METADATA ? Console grouping
# ??????????????????????????????????????????????????????????????????????????????
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: "Environment"
        Parameters:
          - EnvironmentName
      - Label:
          default: "Networking"
        Parameters:
          - VpcId
          - PublicSubnetIds
          - PrivateSubnetIds
      - Label:
          default: "ECS Service Sizing"
        Parameters:
          - AppDesiredCount
          - DashboardDesiredCount
          - ChatbotDesiredCount
          - ContainerPort
      - Label:
          default: "Source for CodeBuild (S3)"
        Parameters:
          - S3SourceBucket
          - S3SourceKey
      - Label:
          default: "Bedrock / Secrets"
        Parameters:
          - BedrockAgentId
          - BedrockAgentAliasId
      - Label:
          default: "Log Processing"
        Parameters:
          - LogRetentionDays
          - ProcessedLogPrefix
      - Label:
          default: "Lambda Scheduler (optional)"
        Parameters:
          - SchedulerState
          - SchedulerExpression
          - SchedulerTarget
          - LambdaLogRetentionDays

# ??????????????????????????????????????????????????????????????????????????????
# PARAMETERS
# ??????????????????????????????????????????????????????????????????????????????
Parameters:

  EnvironmentName:
    Type: String
    Default: prod
    Description: Short environment tag used in all resource names.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC where all resources will be created.

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: "Two PUBLIC subnets (different AZs) for the ALB."

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: "Two PRIVATE subnets (different AZs) for ECS tasks and EFS."

  ContainerPort:
    Type: Number
    Default: 5000
    Description: Port exposed by all three Flask containers.

  AppDesiredCount:
    Type: Number
    Default: 1

  DashboardDesiredCount:
    Type: Number
    Default: 1

  ChatbotDesiredCount:
    Type: Number
    Default: 1

  # ?? CodeBuild source ?????????????????????????????????????????????????????????
  S3SourceBucket:
    Type: String
    Default: ""
    Description: "S3 bucket name that holds the source ZIP. Leave blank on first deploy ? the stack creates the artifact bucket, then update this to that bucket name."

  S3SourceKey:
    Type: String
    Default: "log-aggregator.zip"
    Description: "S3 object key of the source ZIP inside the bucket."

  # ?? Bedrock ??????????????????????????????????????????????????????????????????
  BedrockAgentId:
    Type: String
    Default: "PLACEHOLDER_AGENT_ID"
    Description: "Your Bedrock Agent ID ? stored in Secrets Manager."

  BedrockAgentAliasId:
    Type: String
    Default: "TSTALIASID"
    Description: "Your Bedrock Agent Alias ID ? stored in Secrets Manager."

  # ?? Log Processing ???????????????????????????????????????????????????????????
  LogRetentionDays:
    Type: Number
    Default: 90
    AllowedValues: [30, 60, 90, 180, 365]
    Description: "S3 lifecycle: how many days to keep raw and processed logs before expiry."

  ProcessedLogPrefix:
    Type: String
    Default: "processed/"
    Description: "S3 prefix inside the processed bucket where Lambda writes CSVs and JSON."

  # ?? Lambda Scheduler ?????????????????????????????????????????????????????????
  SchedulerState:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]
    Description: "ENABLED = EventBridge fires scheduler Lambda on schedule. Set ENABLED after first CodeBuild run."

  SchedulerExpression:
    Type: String
    Default: "rate(1 day)"
    Description: "EventBridge schedule expression. Examples: rate(1 day), cron(0 2 * * ? *)"

  SchedulerTarget:
    Type: String
    Default: CODEBUILD
    AllowedValues: [CODEBUILD, ECS_REDEPLOY, BOTH]
    Description: |
      What the scheduler Lambda should do on each tick:
        CODEBUILD    = trigger a full rebuild + redeploy (default)
        ECS_REDEPLOY = force-redeploy all ECS services without rebuilding images
        BOTH         = trigger CodeBuild AND force-redeploy ECS

  LambdaLogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90]
    Description: "CloudWatch log retention for Lambda functions."

# ??????????????????????????????????????????????????????????????????????????????
# RESOURCES
# ??????????????????????????????????????????????????????????????????????????????
Resources:

  # ============================================================
  # 1. ECR REPOSITORIES
  # ============================================================
  EcrAppRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "log-aggregator-app-${EnvironmentName}"
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 5 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
          "action":{"type":"expire"}}]}

  EcrDashboardRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "log-aggregator-dashboard-${EnvironmentName}"
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 5 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
          "action":{"type":"expire"}}]}

  EcrChatbotRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "log-aggregator-chatbot-${EnvironmentName}"
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 5 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
          "action":{"type":"expire"}}]}

  # ============================================================
  # 2. S3 BUCKET ? CodeBuild artifact / source ZIP
  # ============================================================
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "log-aggregator-artifacts-${AWS::AccountId}-${EnvironmentName}"
      VersioningConfiguration: { Status: Enabled }
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }

  # ============================================================
  # 3. S3 BUCKET ? Raw logs
  #
  #   The Flask app writes raw .log files here under:
  #     raw-logs/<filename>.log
  #
  #   An S3 event on that prefix automatically triggers the
  #   LogProcessorLambda to convert the file.
  #
  #   CodeBuild also uploads Lambda deployment ZIPs here under:
  #     lambda/log-processor-<tag>.zip
  #     lambda/log-processor-latest.zip
  # ============================================================
  RawLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "log-aggregator-raw-logs-${AWS::AccountId}-${EnvironmentName}"
      VersioningConfiguration: { Status: Enabled }
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRawLogs
            Status: Enabled
            Prefix: "raw-logs/"
            ExpirationInDays: !Ref LogRetentionDays
          - Id: ExpireLambdaPackages
            Status: Enabled
            Prefix: "lambda/"
            ExpirationInDays: 30

  # Allow S3 to invoke the log processor Lambda
  RawLogsBucketLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LogProcessorLambda.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt RawLogsBucket.Arn

  # Wire S3 event notification via custom resource (avoids circular dependency)
  RawLogsBucketNotification:
    Type: Custom::S3BucketNotification
    DependsOn: RawLogsBucketLambdaPermission
    Properties:
      ServiceToken: !GetAtt S3NotificationSetupLambda.Arn
      BucketName: !Ref RawLogsBucket
      LambdaArn: !GetAtt LogProcessorLambda.Arn
      Prefix: "raw-logs/"

  # ============================================================
  # 4. S3 BUCKET ? Processed logs
  #
  #   Lambda writes converted output here:
  #     processed/csv/<name>.csv        ? converted_application_logs.csv
  #     processed/json/<name>.json      ? unique_errors.json
  #
  #   The Dashboard ECS service reads from this bucket.
  # ============================================================
  ProcessedLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "log-aggregator-processed-${AWS::AccountId}-${EnvironmentName}"
      VersioningConfiguration: { Status: Enabled }
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldProcessedLogs
            Status: Enabled
            Prefix: !Ref ProcessedLogPrefix
            ExpirationInDays: !Ref LogRetentionDays

  # ============================================================
  # 5. SECRETS MANAGER ? Bedrock credentials
  # ============================================================
  BedrockSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "log-aggregator/bedrock-${EnvironmentName}"
      Description: "Bedrock Agent credentials for the chatbot service"
      SecretString: !Sub |
        {
          "BEDROCK_AGENT_ID": "${BedrockAgentId}",
          "BEDROCK_AGENT_ALIAS_ID": "${BedrockAgentAliasId}"
        }

  # ============================================================
  # 6. EFS ? Shared volume (App + Dashboard containers)
  # ============================================================
  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "EFS allow NFS from ECS tasks only"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EcsTaskSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  SharedFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting

  EfsAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref SharedFileSystem
      PosixUser:   { Uid: "1001", Gid: "1001" }
      RootDirectory:
        Path: "/shared"
        CreationInfo: { OwnerUid: "1001", OwnerGid: "1001", Permissions: "0755" }

  EfsMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref SharedFileSystem
      SubnetId:     !Select [0, !Ref PrivateSubnetIds]
      SecurityGroups: [!Ref EfsSecurityGroup]

  EfsMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref SharedFileSystem
      SubnetId:     !Select [1, !Ref PrivateSubnetIds]
      SecurityGroups: [!Ref EfsSecurityGroup]

  # ============================================================
  # 7. SECURITY GROUPS
  # ============================================================
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "ALB allow HTTP from internet"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EcsTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "ECS Tasks allow traffic from ALB only"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # ============================================================
  # 8. APPLICATION LOAD BALANCER
  # ============================================================
  AppLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "log-aggregator-alb-${EnvironmentName}"
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups: [!Ref AlbSecurityGroup]

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "lag-app-tg-${EnvironmentName}"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckPath: /api/status
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  DashboardTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "lag-dashboard-tg-${EnvironmentName}"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckPath: /api/status
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ChatbotTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "lag-chatbot-tg-${EnvironmentName}"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckPath: /api/status
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  ListenerRuleDashboard:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: ["/dashboard", "/dashboard/*"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref DashboardTargetGroup

  ListenerRuleChatbot:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          Values: ["/chatbot", "/chatbot/*"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ChatbotTargetGroup

  # ============================================================
  # 9. IAM ROLES
  # ============================================================

  # ?? ECS Task Execution Role ?????????????????????????????????
  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-ecs-exec-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - kms:Decrypt
                Resource: !Ref BedrockSecret

  # ?? ECS Task Role (what app code can do at runtime) ?????????
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-ecs-task-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref BedrockSecret
        - PolicyName: RawLogsReadWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # App service writes raw logs here
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RawLogsBucket.Arn
                  - !Sub "${RawLogsBucket.Arn}/*"
        - PolicyName: ProcessedLogsRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Dashboard reads processed CSV / JSON from here
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ProcessedLogsBucket.Arn
                  - !Sub "${ProcessedLogsBucket.Arn}/*"
        - PolicyName: EfsAndObservability
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                  - elasticfilesystem:ClientRootAccess
                Resource: !GetAtt SharedFileSystem.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: "*"
                Condition:
                  StringEquals:
                    cloudwatch:namespace: LogAggregator

  # ?? Log Processor Lambda Role ????????????????????????????????
  LogProcessorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-processor-lambda-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReadRawWriteProcessed
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RawLogsBucket.Arn
                  - !Sub "${RawLogsBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ProcessedLogsBucket.Arn
                  - !Sub "${ProcessedLogsBucket.Arn}/*"

  # ?? CodeBuild Role ???????????????????????????????????????????
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-codebuild-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: codebuild.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                  - ecr:DescribeRepositories
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              # Read source ZIP from artifact bucket
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              # Upload Lambda deployment ZIPs to raw bucket
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt RawLogsBucket.Arn
                  - !Sub "${RawLogsBucket.Arn}/*"
              # Update Lambda function code after each build
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:PublishVersion
                  - lambda:UpdateAlias
                  - lambda:CreateAlias
                  - lambda:GetFunction
                  - lambda:GetAlias
                  - lambda:ListVersionsByFunction
                  - lambda:GetFunctionConfiguration
                Resource: !GetAtt LogProcessorLambda.Arn
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref BedrockSecret
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt EcsExecutionRole.Arn
                  - !GetAtt EcsTaskRole.Arn

  # ?? Lambda Scheduler Role ????????????????????????????????????
  LambdaSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-lambda-scheduler-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SchedulerPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: codebuild:StartBuild
                Resource: !GetAtt CodeBuildProject.Arn
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                Resource: "*"
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SchedulerNotificationTopic

  # ?? Custom Resource Lambda Role (S3 notification wiring) ????
  S3NotificationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-s3-notify-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: PutBucketNotification
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: s3:PutBucketNotification
                Resource: !GetAtt RawLogsBucket.Arn

  # ?? EventBridge Role ?????????????????????????????????????????
  EventBridgeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-events-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: events.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt SchedulerLambda.Arn

  # ============================================================
  # 10. CLOUDWATCH LOG GROUPS
  # ============================================================
  AppLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/log-aggregator-app-${EnvironmentName}"
      RetentionInDays: 30

  DashboardLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/log-aggregator-dashboard-${EnvironmentName}"
      RetentionInDays: 30

  ChatbotLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/log-aggregator-chatbot-${EnvironmentName}"
      RetentionInDays: 30

  LogProcessorLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/log-aggregator-processor-${EnvironmentName}"
      RetentionInDays: !Ref LambdaLogRetentionDays

  SchedulerLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/log-aggregator-scheduler-${EnvironmentName}"
      RetentionInDays: !Ref LambdaLogRetentionDays

  S3NotificationLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/log-aggregator-s3-notify-${EnvironmentName}"
      RetentionInDays: 7

  # ============================================================
  # 11. ECS CLUSTER
  # ============================================================
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "log-aggregator-cluster-${EnvironmentName}"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  # ============================================================
  # 12. ECS TASK DEFINITIONS
  # ============================================================

  AppTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "log-aggregator-app-${EnvironmentName}"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      Volumes:
        - Name: shared-efs
          EFSVolumeConfiguration:
            FilesystemId: !Ref SharedFileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref EfsAccessPoint
              IAM: ENABLED
      ContainerDefinitions:
        - Name: app
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/log-aggregator-app-${EnvironmentName}:latest"
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - Name: APP_PORT
              Value: !Sub "${ContainerPort}"
            - Name: APP_HOST
              Value: "0.0.0.0"
            - Name: SERVICE_TYPE
