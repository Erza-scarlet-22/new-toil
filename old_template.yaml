  # ============================================================
  # 14. LAMBDA ? Log Processor
  #
  #   Triggered by S3 PUT events on raw-logs/ prefix.
  #
  #   Flow:
  #     1. App service writes  s3://<raw>/raw-logs/<file>.log
  #     2. S3 fires this Lambda automatically
  #     3. Lambda downloads the file, converts it via
  #        log_to_csv_service.convert_log_to_rows()
  #     4. Writes CSV  ? s3://<processed>/processed/csv/<file>.csv
  #     5. Writes JSON ? s3://<processed>/processed/json/<file>.json
  #     6. Dashboard reads from processed bucket
  #
  #   The inline stub below is replaced by CodeBuild on first run
  #   via: aws lambda update-function-code --s3-bucket <raw>
  #        --s3-key lambda/log-processor-latest.zip
  # ============================================================
  LogProcessorLambda:
    Type: AWS::Lambda::Function
    DependsOn: LogProcessorLambdaLogGroup
    Properties:
      FunctionName: !Sub "log-aggregator-processor-${EnvironmentName}"
      Description: "S3-triggered: converts raw logs to CSV+JSON in the processed bucket"
      Runtime: python3.12
      Handler: lambda_handler.handler
      Role: !GetAtt LogProcessorLambdaRole.Arn
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          RAW_LOGS_BUCKET:  !Ref RawLogsBucket
          PROCESSED_BUCKET: !Ref ProcessedLogsBucket
          PROCESSED_PREFIX: !Ref ProcessedLogPrefix
          LOG_LEVEL:        INFO
      Code:
        ZipFile: |
          import os, json, boto3, urllib.parse

          s3 = boto3.client("s3")
          RAW_BUCKET       = os.environ["RAW_LOGS_BUCKET"]
          PROCESSED_BUCKET = os.environ["PROCESSED_BUCKET"]
          PROCESSED_PREFIX = os.environ.get("PROCESSED_PREFIX", "processed/")

          def handler(event, context):
              """
              Bootstrap stub ? replaced by CodeBuild on first deploy.
              Real handler lives in lambda/lambda_handler.py inside your ZIP.
              """
              print(f"[LogProcessor] Event: {json.dumps(event)}")
              for record in event.get("Records", []):
                  bucket = record["s3"]["bucket"]["name"]
                  key    = urllib.parse.unquote_plus(record["s3"]["object"]["key"])
                  print(f"[LogProcessor] Processing s3://{bucket}/{key}")

                  obj      = s3.get_object(Bucket=bucket, Key=key)
                  raw_text = obj["Body"].read().decode("utf-8", errors="replace")
                  filename = key.split("/")[-1].replace(".log", "")

                  stub_csv  = "timestamp,level,message\n# stub ? run CodeBuild to deploy real handler\n"
                  stub_json = json.dumps({"status": "stub", "source": key, "lines": raw_text.count("\n")})

                  s3.put_object(Bucket=PROCESSED_BUCKET,
                                Key=f"{PROCESSED_PREFIX}csv/{filename}.csv",
                                Body=stub_csv, ContentType="text/csv")
                  s3.put_object(Bucket=PROCESSED_BUCKET,
                                Key=f"{PROCESSED_PREFIX}json/{filename}.json",
                                Body=stub_json, ContentType="application/json")

                  print(f"[LogProcessor] Stub written for {filename}")
              return {"statusCode": 200}

  # ============================================================
  # 15. CUSTOM RESOURCE ? Wire S3 ? Lambda notification
  #
  #   CloudFormation cannot put the S3 notification config
  #   inside AWS::S3::Bucket when the target Lambda is in the
  #   same stack (circular dependency).
  #   This small helper Lambda calls PutBucketNotificationConfiguration
  #   after both the bucket and processor Lambda are created.
  # ============================================================
  S3NotificationSetupLambda:
    Type: AWS::Lambda::Function
    DependsOn: S3NotificationLambdaLogGroup
    Properties:
      FunctionName: !Sub "log-aggregator-s3-notify-setup-${EnvironmentName}"
      Description: "One-time custom resource: wires raw-logs S3 event to LogProcessorLambda"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt S3NotificationLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3, json, urllib.request

          s3 = boto3.client("s3")

          def cfn_respond(event, context, status, reason="OK"):
              body = json.dumps({
                  "Status": status, "Reason": reason,
                  "PhysicalResourceId": event.get("PhysicalResourceId", context.log_stream_name),
                  "StackId": event["StackId"], "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
              }).encode()
              req = urllib.request.Request(url=event["ResponseURL"], data=body,
                                           headers={"Content-Type": ""}, method="PUT")
              urllib.request.urlopen(req)

          def handler(event, context):
              print(json.dumps(event))
              p      = event["ResourceProperties"]
              bucket = p["BucketName"]
              fn_arn = p["LambdaArn"]
              prefix = p.get("Prefix", "raw-logs/")
              try:
                  if event["RequestType"] in ("Create", "Update"):
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket,
                          NotificationConfiguration={"LambdaFunctionConfigurations": [{
                              "LambdaFunctionArn": fn_arn,
                              "Events": ["s3:ObjectCreated:*"],
                              "Filter": {"Key": {"FilterRules": [{"Name": "prefix", "Value": prefix}]}}
                          }]}
                      )
                      print(f"Notification set: s3://{bucket}/{prefix}* -> {fn_arn}")
                  else:
                      s3.put_bucket_notification_configuration(
                          Bucket=bucket, NotificationConfiguration={})
                      print(f"Notification cleared: s3://{bucket}")
                  cfn_respond(event, context, "SUCCESS")
              except Exception as e:
                  print(f"ERROR: {e}")
                  cfn_respond(event, context, "FAILED", str(e))

  # ============================================================
  # 16. CODEBUILD PROJECT
  # ============================================================
  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "log-aggregator-build-${EnvironmentName}"
      Description: "Builds 3 Docker images, packages Lambda processor, pushes to ECR, deploys"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: NO_ARTIFACTS
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: true
        EnvironmentVariables:
          - Name: AWS_DEFAULT_REGION
            Value: !Ref AWS::Region
          - Name: AWS_ACCOUNT_ID
            Value: !Ref AWS::AccountId
          - Name: ECR_APP_URI
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/log-aggregator-app-${EnvironmentName}"
          - Name: ECR_DASHBOARD_URI
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/log-aggregator-dashboard-${EnvironmentName}"
          - Name: ECR_CHATBOT_URI
            Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/log-aggregator-chatbot-${EnvironmentName}"
          - Name: ECS_CLUSTER_NAME
            Value: !Ref EcsCluster
          - Name: APP_SERVICE_NAME
            Value: !Sub "log-aggregator-app-svc-${EnvironmentName}"
          - Name: DASHBOARD_SERVICE_NAME
            Value: !Sub "log-aggregator-dashboard-svc-${EnvironmentName}"
          - Name: CHATBOT_SERVICE_NAME
            Value: !Sub "log-aggregator-chatbot-svc-${EnvironmentName}"
          - Name: ARTIFACT_BUCKET
            Value: !Ref ArtifactBucket
          - Name: RAW_LOGS_BUCKET
            Value: !Ref RawLogsBucket
          - Name: PROCESSED_BUCKET
            Value: !Ref ProcessedLogsBucket
          - Name: LAMBDA_FUNCTION_NAME
            Value: !Ref LogProcessorLambda
      Source:
        Type: S3
        Location: !Sub "${S3SourceBucket}/${S3SourceKey}"
        BuildSpec: |
          version: 0.2

          env:
            variables:
              DOCKER_BUILDKIT: "1"

          phases:
            install:
              runtime-versions:
                python: "3.12"
              commands:
                - pip install --upgrade pip awscli --quiet

            pre_build:
              commands:
                - echo "Logging in to ECR..."
                - aws ecr get-login-password --region $AWS_DEFAULT_REGION |
                    docker login --username AWS --password-stdin
                    $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
                - export IMAGE_TAG=$(date +%Y%m%d%H%M%S)
                - echo "Image tag -> $IMAGE_TAG"
                - ls -la
                - |
                  if [ ! -f "dockerfiles/Dockerfile.app" ]; then
                    FOUND=$(find . -name "Dockerfile.app" | head -1)
                    if [ -n "$FOUND" ]; then
                      NESTED=$(dirname $(dirname $FOUND))
                      echo "Flattening from $NESTED..."
                      cp -r $NESTED/. .
                    fi
                  fi

            build:
              commands:
                # ?? Docker images ??????????????????????????????????????????
                - echo "Building App image..."
                - docker build --cache-from $ECR_APP_URI:latest
                    -f dockerfiles/Dockerfile.app
                    -t $ECR_APP_URI:$IMAGE_TAG -t $ECR_APP_URI:latest .

                - echo "Building Dashboard image..."
                - docker build --cache-from $ECR_DASHBOARD_URI:latest
                    -f dockerfiles/Dockerfile.dashboard
                    -t $ECR_DASHBOARD_URI:$IMAGE_TAG -t $ECR_DASHBOARD_URI:latest .

                - echo "Building Chatbot image..."
                - docker build --cache-from $ECR_CHATBOT_URI:latest
                    -f dockerfiles/Dockerfile.chatbot
                    -t $ECR_CHATBOT_URI:$IMAGE_TAG -t $ECR_CHATBOT_URI:latest .

                # ?? Lambda deployment package ??????????????????????????????
                # Bundles lambda_handler.py + Conversion/ into a ZIP,
                # uploads to s3://$RAW_LOGS_BUCKET/lambda/, then calls
                # update-function-code to replace the bootstrap stub.
                - echo "Packaging Lambda processor..."
                - rm -rf /tmp/lambda-pkg && mkdir -p /tmp/lambda-pkg
                - pip install -r Conversion/requirements.txt -t /tmp/lambda-pkg/ --quiet 2>/dev/null || true
                - cp Conversion/log_parser.py         /tmp/lambda-pkg/ 2>/dev/null || true
                - cp Conversion/log_to_csv_service.py /tmp/lambda-pkg/ 2>/dev/null || true
                - cp lambda/lambda_handler.py          /tmp/lambda-pkg/
                - cd /tmp/lambda-pkg
                - zip -r9 /tmp/log-processor-$IMAGE_TAG.zip . -x "*.pyc" -x "__pycache__/*"
                - cd $CODEBUILD_SRC_DIR
                - aws s3 cp /tmp/log-processor-$IMAGE_TAG.zip
                    s3://$RAW_LOGS_BUCKET/lambda/log-processor-$IMAGE_TAG.zip
                - aws s3 cp /tmp/log-processor-$IMAGE_TAG.zip
                    s3://$RAW_LOGS_BUCKET/lambda/log-processor-latest.zip
                - echo "Lambda package -> s3://$RAW_LOGS_BUCKET/lambda/"

            post_build:
              commands:
                # ?? Push images ????????????????????????????????????????????
                - docker push $ECR_APP_URI:$IMAGE_TAG && docker push $ECR_APP_URI:latest
                - docker push $ECR_DASHBOARD_URI:$IMAGE_TAG && docker push $ECR_DASHBOARD_URI:latest
                - docker push $ECR_CHATBOT_URI:$IMAGE_TAG && docker push $ECR_CHATBOT_URI:latest

                # ?? Update Lambda function code ????????????????????????????
                - echo "Updating Lambda function code..."
                - aws lambda update-function-code
                    --function-name $LAMBDA_FUNCTION_NAME
                    --s3-bucket $RAW_LOGS_BUCKET
                    --s3-key lambda/log-processor-latest.zip
                - aws lambda wait function-updated --function-name $LAMBDA_FUNCTION_NAME
                - aws lambda publish-version --function-name $LAMBDA_FUNCTION_NAME
                - echo "Lambda updated: $LAMBDA_FUNCTION_NAME"

                # ?? Force ECS redeployments ????????????????????????????????
                - aws ecs update-service --cluster $ECS_CLUSTER_NAME
                    --service $APP_SERVICE_NAME --force-new-deployment
                - aws ecs update-service --cluster $ECS_CLUSTER_NAME
                    --service $DASHBOARD_SERVICE_NAME --force-new-deployment
                - aws ecs update-service --cluster $ECS_CLUSTER_NAME
                    --service $CHATBOT_SERVICE_NAME --force-new-deployment

                - echo "Build complete. Tag -> $IMAGE_TAG"

          cache:
            paths:
              - "/root/.cache/pip/**/*"

      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Sub "/codebuild/log-aggregator-${EnvironmentName}"
          StreamName: build

  # ============================================================
  # 17. SNS TOPIC ? Scheduler notifications
  # ============================================================
  SchedulerNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "log-aggregator-scheduler-notify-${EnvironmentName}"
      DisplayName: "Log Aggregator Scheduler Alerts"

  # ============================================================
  # 18. LAMBDA ? Scheduler
  # ============================================================
  SchedulerLambda:
    Type: AWS::Lambda::Function
    DependsOn: SchedulerLambdaLogGroup
    Properties:
      FunctionName: !Sub "log-aggregator-scheduler-${EnvironmentName}"
      Description: "EventBridge-triggered: starts CodeBuild and/or force-redeployes ECS"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaSchedulerRole.Arn
      Timeout: 60
      MemorySize: 128
      Environment:
        Variables:
          CODEBUILD_PROJECT_NAME: !Ref CodeBuildProject
          ECS_CLUSTER_NAME:       !Ref EcsCluster
          APP_SERVICE_NAME:       !Sub "log-aggregator-app-svc-${EnvironmentName}"
          DASHBOARD_SERVICE_NAME: !Sub "log-aggregator-dashboard-svc-${EnvironmentName}"
          CHATBOT_SERVICE_NAME:   !Sub "log-aggregator-chatbot-svc-${EnvironmentName}"
          SNS_TOPIC_ARN:          !Ref SchedulerNotificationTopic
          SCHEDULER_TARGET:       !Ref SchedulerTarget
      Code:
        ZipFile: |
          import os, json, boto3, traceback
          from datetime import datetime, timezone

          cb  = boto3.client("codebuild")
          ecs = boto3.client("ecs")
          sns = boto3.client("sns")

          PROJECT  = os.environ["CODEBUILD_PROJECT_NAME"]
          CLUSTER  = os.environ["ECS_CLUSTER_NAME"]
          SERVICES = [os.environ["APP_SERVICE_NAME"],
                      os.environ["DASHBOARD_SERVICE_NAME"],
                      os.environ["CHATBOT_SERVICE_NAME"]]
          SNS_ARN  = os.environ["SNS_TOPIC_ARN"]
          TARGET   = os.environ.get("SCHEDULER_TARGET", "CODEBUILD")

          def _now():
              return datetime.now(timezone.utc).strftime("%Y-%m-%d %H:%M UTC")

          def start_codebuild():
              bid = cb.start_build(projectName=PROJECT)["build"]["id"]
              print(f"[CodeBuild] Started: {bid}")
              return bid

          def force_ecs_redeploy():
              out = []
              for svc in SERVICES:
                  try:
                      ecs.update_service(cluster=CLUSTER, service=svc, forceNewDeployment=True)
                      out.append(f"  OK  {svc}")
                  except Exception as e:
                      out.append(f"  ERR {svc}: {e}")
              return out

          def notify(subject, msg):
              try:
                  sns.publish(TopicArn=SNS_ARN, Subject=subject, Message=msg)
              except Exception:
                  print(f"[SNS] Failed: {traceback.format_exc()}")

          def handler(event, context):
              lines = [f"Scheduler ran at {_now()}", f"Target: {TARGET}", ""]
              try:
                  if TARGET in ("CODEBUILD", "BOTH"):
                      lines.append(f"[CodeBuild] {start_codebuild()}")
                  if TARGET in ("ECS_REDEPLOY", "BOTH"):
                      lines += ["[ECS] Redeploy:"] + force_ecs_redeploy()
              except Exception:
                  tb = traceback.format_exc()
                  lines.append(f"\nERROR:\n{tb}")
                  notify(f"[ALERT] Scheduler FAILED ? {_now()}", "\n".join(lines))
                  raise
              notify(f"[OK] Scheduler completed ? {_now()}", "\n".join(lines))
              return {"statusCode": 200, "body": "\n".join(lines)}

  SchedulerLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt SchedulerLambda.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduledBuildRule.Arn

  # ============================================================
  # 19. EVENTBRIDGE RULE
  # ============================================================
  ScheduledBuildRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "log-aggregator-build-schedule-${EnvironmentName}"
      Description: "Fires scheduler Lambda on the configured schedule"
      State: !Ref SchedulerState
      ScheduleExpression: !Ref SchedulerExpression
      Targets:
        - Id: SchedulerLambdaTarget
          Arn: !GetAtt SchedulerLambda.Arn

