    Description: "ECR URI ? Chatbot"
    Value: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/log-aggregator-chatbot-${EnvironmentName}"

  EcsClusterName:
    Description: "ECS Cluster"
    Value: !Ref EcsCluster

  # ?? S3 Buckets ?????????????????????????????????????????????????????????????
  ArtifactBucketName:
    Description: "S3 ? Upload your source ZIP here (CodeBuild reads from this)"
    Value: !Ref ArtifactBucket

  RawLogsBucketName:
    Description: "S3 ? App writes raw logs to raw-logs/ prefix; Lambda reads + converts them; CodeBuild stores Lambda ZIPs under lambda/"
    Value: !Ref RawLogsBucket

  ProcessedLogsBucketName:
    Description: "S3 ? Lambda writes converted CSV + JSON here; Dashboard reads from this"
    Value: !Ref ProcessedLogsBucket

  # ?? Lambda ?????????????????????????????????????????????????????????????????
  LogProcessorLambdaName:
    Description: "Lambda ? Log Processor (auto-triggered by S3 on raw-logs/ prefix)"
    Value: !Ref LogProcessorLambda

  LogProcessorLambdaArn:
    Description: "Lambda ? Log Processor ARN"
    Value: !GetAtt LogProcessorLambda.Arn

  SchedulerLambdaName:
    Description: "Lambda ? Scheduler (test manually first, then enable EventBridge)"
    Value: !Ref SchedulerLambda

  # ?? Other ??????????????????????????????????????????????????????????????????
  CodeBuildProjectName:
    Description: "CodeBuild ? start this to build images + update Lambda + redeploy ECS"
    Value: !Ref CodeBuildProject

  BedrockSecretArn:
    Description: "Secrets Manager ? update BEDROCK_AGENT_ID here after creating your Agent"
    Value: !Ref BedrockSecret

  SchedulerNotificationTopicArn:
    Description: "SNS ? subscribe your email here to receive scheduler alerts"
    Value: !Ref SchedulerNotificationTopic
