      Description: >
        Bedrock action group: createIncident, getTicketStatus, updateTicket.
        DEMO_MODE=true by default. Set false after configuring servicenow/credentials.
        Stub replaced by CodeBuild.
      Runtime: python3.12
      Handler: servicenow_lambda_handler.handler
      Role: !GetAtt ActionLambdaRole.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          SERVICENOW_SECRET_NAME: !Ref ServiceNowSecretName
          AWS_DEFAULT_REGION:     !Ref AWS::Region
          DEMO_MODE:              "true"
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              fn = event.get("function","createIncident")
              body = '{"ticket_number":"INC_STUB_001","status":"stub","note":"run CodeBuild","ticket_url":"#"}'
              return {"actionGroup": event.get("actionGroup",""), "function": fn,
                      "functionResponse": {"responseBody": {"TEXT": {"body": body}}}}

