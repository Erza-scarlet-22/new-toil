AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Log Aggregator – ECS Fargate + ALB + CodeBuild + Bedrock + EFS
  + Raw/Processed S3 Buckets + Lambda Processor + Scheduler
  + Dummy App (SSL demo) + ServiceNow + Action Lambdas (SSL/Password/DB/Compute)
  UPGRADED: All original resources preserved. New additions:
  DummyApp ECS service, 5 action Lambdas, ServiceNow secret,
  SSL cert secret, updated CodeBuild buildspec, new IAM roles.

# ==============================================================================
# METADATA
# ==============================================================================
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: "Environment" }
        Parameters: [EnvironmentName]
      - Label: { default: "Networking" }
        Parameters: [VpcId, PublicSubnetIds, PrivateSubnetIds]
      - Label: { default: "ECS Service Sizing" }
        Parameters: [AppDesiredCount, DashboardDesiredCount, ChatbotDesiredCount,
                     DummyAppDesiredCount, ContainerPort]
      - Label: { default: "Source for CodeBuild (S3)" }
        Parameters: [S3SourceBucket, S3SourceKey]
      - Label: { default: "Bedrock / Secrets" }
        Parameters: [BedrockAgentId, BedrockAgentAliasId, ServiceNowSecretName]
      - Label: { default: "Log Processing" }
        Parameters: [LogRetentionDays, ProcessedLogPrefix]
      - Label: { default: "Lambda Scheduler (optional)" }
        Parameters: [SchedulerState, SchedulerExpression, SchedulerTarget,
                     LambdaLogRetentionDays]
      - Label: { default: "Dummy App / Remediation" }
        Parameters: [DummyAppServiceName, RdsDbInstanceId]
      - Label: { default: "Real SSL — optional, leave blank for demo" }
        Parameters: [DomainName, HostedZoneId, AcmCertificateArn]

# ==============================================================================
# PARAMETERS  (all originals kept intact — new ones appended)
# ==============================================================================
Parameters:

  # ── Original parameters (unchanged) ────────────────────────────────────────
  EnvironmentName:
    Type: String
    Default: prod
    Description: Short environment tag used in all resource names.

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing VPC where all resources will be created.

  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: "Two PUBLIC subnets (different AZs) for the ALB."

  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: "Two PRIVATE subnets (different AZs) for ECS tasks and EFS."

  ContainerPort:
    Type: Number
    Default: 5000
    Description: Port exposed by all three Flask containers.

  AppDesiredCount:
    Type: Number
    Default: 1

  DashboardDesiredCount:
    Type: Number
    Default: 1

  ChatbotDesiredCount:
    Type: Number
    Default: 1

  S3SourceBucket:
    Type: String
    Default: ""
    Description: "S3 bucket holding the source ZIP (your artifact bucket)."

  S3SourceKey:
    Type: String
    Default: "log-aggregator.zip"

  BedrockAgentId:
    Type: String
    Default: "PLACEHOLDER_AGENT_ID"

  BedrockAgentAliasId:
    Type: String
    Default: "TSTALIASID"

  LogRetentionDays:
    Type: Number
    Default: 90
    AllowedValues: [30, 60, 90, 180, 365]

  ProcessedLogPrefix:
    Type: String
    Default: "processed/"

  SchedulerState:
    Type: String
    Default: DISABLED
    AllowedValues: [ENABLED, DISABLED]

  SchedulerExpression:
    Type: String
    Default: "rate(1 day)"

  SchedulerTarget:
    Type: String
    Default: CODEBUILD
    AllowedValues: [CODEBUILD, ECS_REDEPLOY, BOTH]

  LambdaLogRetentionDays:
    Type: Number
    Default: 14
    AllowedValues: [1, 3, 5, 7, 14, 30, 60, 90]

  # ── NEW parameters ──────────────────────────────────────────────────────────
  DummyAppDesiredCount:
    Type: Number
    Default: 1
    Description: Desired task count for the dummy-infra-app ECS service.

  DummyAppServiceName:
    Type: String
    Default: "dummy-infra-app"
    Description: Name used for dummy app ECS service and ECR repo.

  ServiceNowSecretName:
    Type: String
    Default: "servicenow/credentials"
    Description: Secrets Manager secret name for ServiceNow credentials.

  RdsDbInstanceId:
    Type: String
    Default: ""
    Description: RDS instance identifier for DB remediation Lambda (leave blank for demo).

  DomainName:
    Type: String
    Default: ""
    Description: "Optional: real domain for HTTPS, e.g. app.example.com. Leave blank for demo."

  HostedZoneId:
    Type: String
    Default: ""
    Description: "Optional: Route 53 Hosted Zone ID for DomainName. Leave blank for demo."

  AcmCertificateArn:
    Type: String
    Default: ""
    Description: "Optional: existing ACM cert ARN. Leave blank — SSL Lambda provisions one."

# ==============================================================================
# CONDITIONS
# ==============================================================================
Conditions:
  HasAcmCertificate: !Not [!Equals [!Ref AcmCertificateArn, ""]]
  HasDomainName:     !Not [!Equals [!Ref DomainName, ""]]

# ==============================================================================
# RESOURCES
# ==============================================================================
Resources:

  # ============================================================
  # 1. ECR REPOSITORIES  (originals kept — new dummy-app added)
  # ============================================================
  EcrAppRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "log-aggregator-app-${EnvironmentName}"
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 5 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
          "action":{"type":"expire"}}]}

  EcrDashboardRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "log-aggregator-dashboard-${EnvironmentName}"
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 5 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
          "action":{"type":"expire"}}]}

  EcrChatbotRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "log-aggregator-chatbot-${EnvironmentName}"
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 5 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
          "action":{"type":"expire"}}]}

  # NEW
  EcrDummyAppRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "log-aggregator-${DummyAppServiceName}-${EnvironmentName}"
      ImageScanningConfiguration: { ScanOnPush: true }
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 5 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
          "action":{"type":"expire"}}]}

  # ============================================================
  # 2. S3 BUCKET – CodeBuild artifact / source ZIP  (unchanged)
  # ============================================================
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "log-aggregator-artifacts-${AWS::AccountId}-${EnvironmentName}"
      VersioningConfiguration: { Status: Enabled }
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }

  # ============================================================
  # 3. S3 BUCKET – Raw logs  (unchanged)
  # ============================================================
  RawLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "log-aggregator-raw-logs-${AWS::AccountId}-${EnvironmentName}"
      VersioningConfiguration: { Status: Enabled }
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      LifecycleConfiguration:
        Rules:
          - Id: ExpireRawLogs
            Status: Enabled
            Prefix: "raw-logs/"
            ExpirationInDays: !Ref LogRetentionDays
          - Id: ExpireLambdaPackages
            Status: Enabled
            Prefix: "lambda/"
            ExpirationInDays: 30

  RawLogsBucketLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt LogProcessorLambda.Arn
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceAccount: !Ref AWS::AccountId
      SourceArn: !GetAtt RawLogsBucket.Arn

  RawLogsBucketNotification:
    Type: Custom::S3BucketNotification
    DependsOn: RawLogsBucketLambdaPermission
    Properties:
      ServiceToken: !GetAtt S3NotificationSetupLambda.Arn
      BucketName: !Ref RawLogsBucket
      LambdaArn: !GetAtt LogProcessorLambda.Arn
      Prefix: "raw-logs/"

  # ============================================================
  # 4. S3 BUCKET – Processed logs  (unchanged)
  # ============================================================
  ProcessedLogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "log-aggregator-processed-${AWS::AccountId}-${EnvironmentName}"
      VersioningConfiguration: { Status: Enabled }
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldProcessedLogs
            Status: Enabled
            Prefix: !Ref ProcessedLogPrefix
            ExpirationInDays: !Ref LogRetentionDays

  # ============================================================
  # 5. SECRETS MANAGER  (Bedrock unchanged — ServiceNow + SSL NEW)
  # ============================================================
  BedrockSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "log-aggregator/bedrock-${EnvironmentName}"
      Description: "Bedrock Agent credentials for the chatbot service"
      SecretString: !Sub |
        {
          "BEDROCK_AGENT_ID": "${BedrockAgentId}",
          "BEDROCK_AGENT_ALIAS_ID": "${BedrockAgentAliasId}"
        }

  # NEW – ServiceNow credentials
  # After stack deploys, update this secret with real values:
  #   aws secretsmanager put-secret-value \
  #     --secret-id servicenow/credentials \
  #     --secret-string '{"instance_url":"https://devXXXXX.service-now.com","username":"aws-log-aggregator","password":"YourPassword"}'
  ServiceNowSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Ref ServiceNowSecretName
      Description: "ServiceNow developer instance credentials for auto-remediation"
      SecretString: |
        {
          "instance_url": "https://REPLACE_WITH_YOUR_INSTANCE.service-now.com",
          "username":     "aws-log-aggregator",
          "password":     "REPLACE_WITH_REAL_PASSWORD"
        }

  # NEW – SSL cert ARN storage (SSL Lambda writes here after remediation)
  SSLCertSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: "dummy-app/ssl-cert-arn"
      Description: "Current SSL cert ARN managed by SSL remediation Lambda"
      SecretString: |
        {
          "cert_arn":  "not-yet-provisioned",
          "domain":    "api.dummy-app.internal",
          "demo_mode": true
        }

  # ============================================================
  # 6. EFS  (unchanged)
  # ============================================================
  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "EFS allow NFS from ECS tasks only"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 2049
          ToPort: 2049
          SourceSecurityGroupId: !Ref EcsTaskSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  SharedFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: bursting

  EfsAccessPoint:
    Type: AWS::EFS::AccessPoint
    Properties:
      FileSystemId: !Ref SharedFileSystem
      PosixUser:   { Uid: "1001", Gid: "1001" }
      RootDirectory:
        Path: "/shared"
        CreationInfo: { OwnerUid: "1001", OwnerGid: "1001", Permissions: "0755" }

  EfsMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref SharedFileSystem
      SubnetId:     !Select [0, !Ref PrivateSubnetIds]
      SecurityGroups: [!Ref EfsSecurityGroup]

  EfsMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref SharedFileSystem
      SubnetId:     !Select [1, !Ref PrivateSubnetIds]
      SecurityGroups: [!Ref EfsSecurityGroup]

  # ============================================================
  # 7. SECURITY GROUPS
  #    AlbSecurityGroup  — added port 443 (NEW)
  #    EcsTaskSecurityGroup — added port 5001 for dummy app (NEW)
  # ============================================================
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "ALB allow HTTP and HTTPS from internet"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        # NEW – port 443 for HTTPS (used when real SSL cert is attached)
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  EcsTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "ECS Tasks allow traffic from ALB only"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref ContainerPort
          ToPort: !Ref ContainerPort
          SourceSecurityGroupId: !Ref AlbSecurityGroup
        # NEW – port 5001 for dummy app container
        - IpProtocol: tcp
          FromPort: 5001
          ToPort: 5001
          SourceSecurityGroupId: !Ref AlbSecurityGroup
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0

  # ============================================================
  # 8. APPLICATION LOAD BALANCER
  #    Existing resources unchanged. New target group + rules added.
  # ============================================================
  AppLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "log-aggregator-alb-${EnvironmentName}"
      Scheme: internet-facing
      Type: application
      Subnets: !Ref PublicSubnetIds
      SecurityGroups: [!Ref AlbSecurityGroup]

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "lag-app-tg-${EnvironmentName}"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckPath: /api/status
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  DashboardTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "lag-dashboard-tg-${EnvironmentName}"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckPath: /api/status
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  ChatbotTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "lag-chatbot-tg-${EnvironmentName}"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: !Ref ContainerPort
      TargetType: ip
      HealthCheckPath: /api/status
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  # NEW – Dummy app target group (port 5001)
  DummyAppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "lag-dummy-app-tg-${EnvironmentName}"
      VpcId: !Ref VpcId
      Protocol: HTTP
      Port: 5001
      TargetType: ip
      HealthCheckPath: /health
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  ListenerRuleDashboard:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: ["/dashboard", "/dashboard/*"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref DashboardTargetGroup

  ListenerRuleChatbot:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          Values: ["/chatbot", "/chatbot/*"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ChatbotTargetGroup

  # NEW – Dummy app listener rules
  ListenerRuleDummyAppRoot:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 30
      Conditions:
        - Field: path-pattern
          Values: ["/dummy", "/dummy/*"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref DummyAppTargetGroup

  ListenerRuleDummyAppApi:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 31
      Conditions:
        - Field: path-pattern
          Values: ["/api/dummy", "/api/dummy/*"]
      Actions:
        - Type: forward
          TargetGroupArn: !Ref DummyAppTargetGroup

  # NEW – HTTPS listener (only created when AcmCertificateArn is provided)
  AlbListenerHttps:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: HasAcmCertificate
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Protocol: HTTPS
      Port: 443
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref AcmCertificateArn
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

  # NEW – Route 53 alias record (only created when DomainName is provided)
  Route53AliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasDomainName
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt AppLoadBalancer.DNSName
        EvaluateTargetHealth: true
        HostedZoneId: "Z35SXDOTRQ7X7K"   # us-east-1 ALB zone ID

  # ============================================================
  # 9. IAM ROLES
  #    Existing roles kept intact. New roles + policies added.
  # ============================================================

  # UNCHANGED
  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-ecs-exec-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - kms:Decrypt
                Resource:
                  - !Ref BedrockSecret
                  # NEW – execution role also needs SSL cert secret for dummy app
                  - !Ref SSLCertSecret

  # UPDATED – added ReadServiceNowSecret policy for dashboard /api/snow-ticket route
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-ecs-task-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ecs-tasks.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BedrockAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:InvokeAgent
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: "*"
        - PolicyName: SecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref BedrockSecret
        # NEW – allows dashboard container to read ServiceNow secret
        # for the /api/snow-ticket/<INC> polling route
        - PolicyName: ReadServiceNowSecret
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref ServiceNowSecret
        - PolicyName: RawLogsReadWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource:
                  - !GetAtt RawLogsBucket.Arn
                  - !Sub "${RawLogsBucket.Arn}/*"
        - PolicyName: ProcessedLogsRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:ListBucket]
                Resource:
                  - !GetAtt ProcessedLogsBucket.Arn
                  - !Sub "${ProcessedLogsBucket.Arn}/*"
        - PolicyName: EfsAndObservability
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - elasticfilesystem:ClientMount
                  - elasticfilesystem:ClientWrite
                  - elasticfilesystem:ClientRootAccess
                Resource: !GetAtt SharedFileSystem.Arn
              - Effect: Allow
                Action: [logs:CreateLogStream, logs:PutLogEvents]
                Resource: "*"
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: "*"
                Condition:
                  StringEquals:
                    cloudwatch:namespace: LogAggregator

  # UNCHANGED
  LogProcessorLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-processor-lambda-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ReadRawWriteProcessed
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [s3:GetObject, s3:ListBucket]
                Resource:
                  - !GetAtt RawLogsBucket.Arn
                  - !Sub "${RawLogsBucket.Arn}/*"
              - Effect: Allow
                Action: [s3:PutObject, s3:DeleteObject, s3:ListBucket]
                Resource:
                  - !GetAtt ProcessedLogsBucket.Arn
                  - !Sub "${ProcessedLogsBucket.Arn}/*"

  # UPDATED CodeBuildRole – added action Lambda update permissions
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-codebuild-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: codebuild.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                  - ecr:DescribeRepositories
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:DescribeTaskDefinition
                  - ecs:RegisterTaskDefinition
                Resource: "*"
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action: [s3:GetObject, s3:GetObjectVersion, s3:PutObject, s3:ListBucket]
                Resource:
                  - !GetAtt ArtifactBucket.Arn
                  - !Sub "${ArtifactBucket.Arn}/*"
              - Effect: Allow
                Action: [s3:PutObject, s3:GetObject, s3:ListBucket]
                Resource:
                  - !GetAtt RawLogsBucket.Arn
                  - !Sub "${RawLogsBucket.Arn}/*"
              # Original – log processor Lambda
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:PublishVersion
                  - lambda:UpdateAlias
                  - lambda:CreateAlias
                  - lambda:GetFunction
                  - lambda:GetAlias
                  - lambda:ListVersionsByFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:WaitForFunctionUpdated
                Resource: !GetAtt LogProcessorLambda.Arn
              # NEW – action Lambdas
              - Effect: Allow
                Action:
                  - lambda:UpdateFunctionCode
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:WaitForFunctionUpdated
                Resource:
                  - !GetAtt ServiceNowLambda.Arn
                  - !GetAtt SSLRemediationLambda.Arn
                  - !GetAtt PasswordResetLambda.Arn
                  - !GetAtt DBRemediationLambda.Arn
                  - !GetAtt ComputeRemediationLambda.Arn
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref BedrockSecret
              - Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !GetAtt EcsExecutionRole.Arn
                  - !GetAtt EcsTaskRole.Arn

  # UNCHANGED
  LambdaSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "log-aggregator-lambda-scheduler-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SchedulerPermissions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
