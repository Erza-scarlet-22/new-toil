  AppTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "log-aggregator-app-${EnvironmentName}"
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      Volumes:
        - Name: shared-efs
          EFSVolumeConfiguration:
            FilesystemId: !Ref SharedFileSystem
            TransitEncryption: ENABLED
            AuthorizationConfig:
              AccessPointId: !Ref EfsAccessPoint
              IAM: ENABLED
      ContainerDefinitions:
        - Name: app
          Image: !Sub "${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/log-aggregator-app-${EnvironmentName}:latest"
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          Environment:
            - { Name: APP_PORT,           Value: !Sub "${ContainerPort}" }
            - { Name: APP_HOST,           Value: "0.0.0.0" }
            - { Name: SERVICE_TYPE,       Value: app }
            - { Name: LOG_LEVEL,          Value: INFO }
            - { Name: AWS_DEFAULT_REGION, Value: !Ref AWS::Region }
            - { Name: PYTHONUNBUFFERED,   Value: "1" }
            - { Name: RAW_LOGS_BUCKET,    Value: !Ref RawLogsBucket }
            - { Name: PROCESSED_BUCKET,   Value: !Ref ProcessedLogsBucket }
            - { Name: RAW_LOGS_PREFIX,    Value: "raw-logs/" }
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref AppLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: app
          MountPoints:
            - ContainerPath: /shared
              SourceVolume: shared-efs
          Essential: true
          HealthCheck:
            Command: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/api/status')\" || exit 1"]
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60

