      Code:
        ZipFile: |
          import json
          def handler(event, context):
              return {"actionGroup": event.get("actionGroup",""), "function": event.get("function",""),
                      "functionResponse": {"responseBody": {"TEXT": {"body": '{"status":"stub","note":"run CodeBuild"}'}}}}

